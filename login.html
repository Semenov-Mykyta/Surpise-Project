<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <title>Login – NovaStore</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/navbar.css" />
    <link rel="stylesheet" href="css/sections.css" />
    <link rel="stylesheet" href="css/pages.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <script defer src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script defer src="js/translations.js"></script>
    <script defer src="js/auth.js"></script>
    <script defer src="js/cart.js"></script>
    <script defer src="js/main.js"></script>
</head>

<body>

<header class="header glass-nav fade-down">
    <div class="container header-inner">

        <a href="index.html" class="logo">
            <img src="assets/logo.svg" alt="NovaStore Logo" />
            <span class="logo-text">NovaStore</span>
        </a>

        <nav class="nav" id="nav">
            <a href="index.html" data-i18n="nav.home"></a>
            <a href="shop.html" data-i18n="nav.shop"></a>
            <a href="support.html" data-i18n="nav.support"></a>
        </nav>

        <div class="header-actions">

            <button class="btn-icon" id="lang-toggle">
                <span id="lang-label">EN</span>
            </button>

            <button class="btn-icon" id="theme-toggle">
                <span class="theme-icon">🌙</span>
            </button>

            <button class="btn-icon cart-btn" id="cart-toggle">
                <span class="cart-icon">🛒</span>
                <span class="cart-count" id="cart-count">0</span>
            </button>

            <!-- 🔥 USER INDICATOR -->
            <span id="user-indicator" class="user-indicator">Login</span>

            <button class="burger" id="burger">
                <span></span><span></span><span></span>
            </button>

        </div>
    </div>
</header>

<aside class="cart-sidebar" id="cart-sidebar">
    <div class="cart-header">
        <h2 data-i18n="cart.title"></h2>
        <button class="btn-icon" id="cart-close">✕</button>
    </div>

    <div class="cart-items" id="cart-items"></div>

    <div class="cart-footer">
        <div class="cart-total">
            <span data-i18n="cart.total"></span>
            <span id="cart-total-amount">€0.00</span>
        </div>
        <button class="btn primary full" data-i18n="cart.checkout"></button>
    </div>
</aside>

<main class="fade-in">

    <section class="section auth-section">
        <div class="container auth-layout glass-card">

            <div class="auth-tabs">
                <button class="auth-tab active" data-auth-tab="login"></button>
                <button class="auth-tab" data-auth-tab="register"></button>
            </div>

            <div class="auth-forms">

                <form id="login-form" class="auth-form active" novalidate>
                    <h1>Login</h1>

                    <div class="form-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" required />
                    </div>

                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" required />
                    </div>

                    <button type="submit" class="btn primary full">Login</button>

                    <button type="button" id="forgot-password-btn" class="link-btn">
                        Forgot password?
                    </button>

                    <div class="auth-status" id="login-status"></div>
                </form>

                <form id="register-form" class="auth-form" novalidate>
                    <h1>Register</h1>

                    <div class="form-group">
                        <label for="register-email">Email</label>
                        <input type="email" id="register-email" required />
                    </div>

                    <div class="form-group">
                        <label for="register-password">Password</label>
                        <input type="password" id="register-password" required />
                    </div>

                    <button type="submit" class="btn primary full">Register</button>

                    <div class="auth-status" id="register-status"></div>
                </form>

            </div>
        </div>
    </section>

    <section class="section fade-in" id="dashboard" hidden>
        <div class="container glass-card dashboard">

            <h2>Dashboard</h2>
            <p id="dashboard-email"></p>

            <div class="dashboard-grid">
                <div class="dashboard-card">
                    <h3>Profile</h3>
                    <p>Your account info</p>
                </div>

                <div class="dashboard-card">
                    <h3>Orders</h3>
                    <p>Your orders</p>
                </div>

                <div class="dashboard-card">
                    <h3>Settings</h3>
                    <p>Account settings</p>
                </div>

                <div class="dashboard-card">
                    <h3>Security</h3>
                    <p>Password & security</p>
                </div>
            </div>

            <button id="logout-btn" class="btn ghost">Logout</button>
        </div>
    </section>

</main>

<footer class="footer fade-in">
    <div class="container footer-inner">

        <div class="footer-col">
            <h4>NovaStore</h4>
            <p>Modern e-commerce experience</p>
        </div>

        <div class="footer-col">
            <h4>Links</h4>
            <a href="shop.html">Shop</a>
            <a href="support.html">Support</a>
            <a href="legal.html#terms">Terms</a>
            <a href="legal.html#privacy">Privacy</a>
        </div>

        <div class="footer-col">
            <h4>Contact</h4>
            <p>support@novastore.app</p>
        </div>

    </div>
</footer>

</body>
</html>
