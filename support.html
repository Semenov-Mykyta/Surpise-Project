<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <title>Support – NovaStore</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/navbar.css" />
    <link rel="stylesheet" href="css/sections.css" />
    <link rel="stylesheet" href="css/pages.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <script defer src="js/translations.js"></script>
    <script defer src="js/support.js"></script>
    <script defer src="js/main.js"></script>
</head>
<body>
<header class="header glass-nav fade-down">
    <div class="container header-inner">
        <a href="index.html" class="logo">
            <img src="assets/logo.svg" alt="NovaStore Logo" />
            <span class="logo-text">NovaStore</span>
        </a>
        <nav class="nav" id="nav">
            <a href="index.html" data-i18n="nav.home"></a>
            <a href="shop.html" data-i18n="nav.shop"></a>
            <a href="support.html" class="active" data-i18n="nav.support"></a>
        </nav>
        <div class="header-actions">
            <button class="btn-icon" id="lang-toggle"><span id="lang-label">EN</span></button>
            <button class="btn-icon" id="theme-toggle"><span class="theme-icon">🌙</span></button>
            <a href="login.html" class="btn ghost" data-i18n="nav.login"></a>
            <button class="btn-icon cart-btn" id="cart-toggle">
                <span class="cart-icon">🛒</span>
                <span class="cart-count" id="cart-count">0</span>
            </button>
            <button class="burger" id="burger"><span></span><span></span><span></span></button>
        </div>
    </div>
</header>

<aside class="cart-sidebar" id="cart-sidebar">
    <div class="cart-header">
        <h2 data-i18n="cart.title"></h2>
        <button class="btn-icon" id="cart-close">✕</button>
    </div>
    <div class="cart-items" id="cart-items"></div>
    <div class="cart-footer">
        <div class="cart-total">
            <span data-i18n="cart.total"></span>
            <span id="cart-total-amount">€0.00</span>
        </div>
        <button class="btn primary full" data-i18n="cart.checkout"></button>
    </div>
</aside>

<main class="fade-in">
    <section class="section">
        <div class="container support-layout glass-card">
            <div class="support-info">
                <h1 data-i18n="support.title"></h1>
                <p data-i18n="support.subtitle"></p>
                <ul class="support-benefits">
                    <li data-i18n="support.point1"></li>
                    <li data-i18n="support.point2"></li>
                    <li data-i18n="support.point3"></li>
                </ul>
            </div>

            <form id="support-form" class="support-form" novalidate>
                <div class="form-group">
                    <label for="support-name" data-i18n="support.name"></label>
                    <input type="text" id="support-name" required />
                </div>
                <div class="form-group">
                    <label for="support-email" data-i18n="support.email"></label>
                    <input type="email" id="support-email" required />
                </div>
                <div class="form-group">
                    <label for="support-subject" data-i18n="support.subject"></label>
                    <input type="text" id="support-subject" required />
                </div>
                <div class="form-group">
                    <label for="support-order" data-i18n="support.order"></label>
                    <input type="text" id="support-order" />
                </div>
                <div class="form-group">
                    <label for="support-message" data-i18n="support.message"></label>
                    <textarea id="support-message" rows="4" required></textarea>
                </div>
                <button type="submit" class="btn primary full ripple" id="support-submit" data-i18n="support.submit"></button>
                <div class="form-status" id="support-status"></div>
            </form>
        </div>
    </section>
</main>

<footer class="footer fade-in">
    <div class="container footer-inner">
        <div class="footer-col">
            <h4>NovaStore</h4>
            <p data-i18n="footer.tagline"></p>
        </div>
        <div class="footer-col">
            <h4 data-i18n="footer.links"></h4>
            <a href="shop.html" data-i18n="footer.shop"></a>
            <a href="support.html" data-i18n="footer.support"></a>
            <a href="legal.html#terms" data-i18n="footer.terms"></a>
            <a href="legal.html#privacy" data-i18n="footer.privacy"></a>
        </div>
        <div class="footer-col">
            <h4 data-i18n="footer.contact"></h4>
            <p>support@novastore.app</p>
        </div>
    </div>
</footer>
</body>
</html>
