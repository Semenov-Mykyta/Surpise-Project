<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <title>Product – NovaStore</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/navbar.css" />
    <link rel="stylesheet" href="css/sections.css" />
    <link rel="stylesheet" href="css/pages.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <script defer src="js/translations.js"></script>
    <script defer src="js/cart.js"></script>
    <script defer src="js/main.js"></script>
</head>
<body>
<header class="header glass-nav fade-down">
    <div class="container header-inner">
        <a href="index.html" class="logo">
            <img src="assets/logo.svg" alt="NovaStore Logo" />
            <span class="logo-text">NovaStore</span>
        </a>
        <nav class="nav" id="nav">
            <a href="index.html" data-i18n="nav.home"></a>
            <a href="shop.html" data-i18n="nav.shop"></a>
            <a href="support.html" data-i18n="nav.support"></a>
        </nav>
        <div class="header-actions">
            <button class="btn-icon" id="lang-toggle"><span id="lang-label">EN</span></button>
            <button class="btn-icon" id="theme-toggle"><span class="theme-icon">🌙</span></button>
            <a href="login.html" class="btn ghost" data-i18n="nav.login"></a>
            <button class="btn-icon cart-btn" id="cart-toggle">
                <span class="cart-icon">🛒</span>
                <span class="cart-count" id="cart-count">0</span>
            </button>
            <button class="burger" id="burger"><span></span><span></span><span></span></button>
        </div>
    </div>
</header>

<aside class="cart-sidebar" id="cart-sidebar">
    <div class="cart-header">
        <h2 data-i18n="cart.title"></h2>
        <button class="btn-icon" id="cart-close">✕</button>
    </div>
    <div class="cart-items" id="cart-items"></div>
    <div class="cart-footer">
        <div class="cart-total">
            <span data-i18n="cart.total"></span>
            <span id="cart-total-amount">€0.00</span>
        </div>
        <button class="btn primary full" data-i18n="cart.checkout"></button>
    </div>
</aside>

<main class="fade-in">
    <section class="section">
        <div class="container product-layout">
            <div class="product-gallery glass-card">
                <div class="product-main-image skeleton"></div>
                <div class="product-thumbs">
                    <div class="thumb skeleton"></div>
                    <div class="thumb skeleton"></div>
                    <div class="thumb skeleton"></div>
                </div>
            </div>
            <div class="product-info glass-card">
                <h1 id="product-title">Aurora Wireless Headphones</h1>
                <p class="product-category" data-i18n="categories.tech"></p>
                <p class="product-price-large">€199</p>
                <p class="product-description">
                    Premium wireless headphones with active noise cancelling, 30h battery life, and ultra-soft ear cushions.
                </p>
                <div class="product-actions">
                    <div class="qty-control">
                        <button class="btn-icon qty-minus">−</button>
                        <input type="number" id="product-qty" value="1" min="1" />
                        <button class="btn-icon qty-plus">+</button>
                    </div>
                    <button class="btn primary ripple" id="product-add-to-cart" data-product-id="1" data-i18n="product.add_to_cart"></button>
                </div>
            </div>
        </div>
    </section>

    <section class="section fade-in">
        <div class="container">
            <div class="section-header">
                <h2 data-i18n="product.related_title"></h2>
            </div>
            <div class="product-grid" id="related-products"></div>
        </div>
    </section>

    <section class="section fade-in">
        <div class="container">
            <div class="section-header">
                <h2 data-i18n="product.reviews_title"></h2>
            </div>
            <div class="reviews-grid">
                <article class="review-card glass-card hover-lift">
                    <p class="review-text" data-i18n="reviews.r1_text"></p>
                    <span class="review-author" data-i18n="reviews.r1_author"></span>
                </article>
            </div>
        </div>
    </section>
</main>

<footer class="footer fade-in">
    <div class="container footer-inner">
        <div class="footer-col">
            <h4>NovaStore</h4>
            <p data-i18n="footer.tagline"></p>
        </div>
        <div class="footer-col">
            <h4 data-i18n="footer.links"></h4>
            <a href="shop.html" data-i18n="footer.shop"></a>
            <a href="support.html" data-i18n="footer.support"></a>
            <a href="legal.html#terms" data-i18n="footer.terms"></a>
            <a href="legal.html#privacy" data-i18n="footer.privacy"></a>
        </div>
        <div class="footer-col">
            <h4 data-i18n="footer.contact"></h4>
            <p>support@novastore.app</p>
        </div>
    </div>
</footer>
</body>
</html>
