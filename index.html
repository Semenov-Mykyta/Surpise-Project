    <!DOCTYPE html>
    <html lang="en" data-theme="dark">
    <head>
        <meta charset="UTF-8" />
        <title>NovaStore – Premium Tech & Fashion</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="description" content="Modern premium e-commerce store for tech and fashion." />
        <link rel="stylesheet" href="css/base.css" />
        <link rel="stylesheet" href="css/navbar.css" />
        <link rel="stylesheet" href="css/sections.css" />
        <link rel="stylesheet" href="css/pages.css" />
        <link rel="stylesheet" href="css/responsive.css" />
        <script defer src="js/translations.js"></script>
        <script defer src="js/cart.js"></script>
        <script defer src="js/main.js"></script>
    </head>
    <body>
    <div class="page-loader" id="page-loader">
        <div class="loader-glass"></div>
    </div>

    <header class="header glass-nav fade-down">
        <div class="container header-inner">
            <a href="index.html" class="logo">
                <img src="assets/logo.svg" alt="NovaStore Logo" />
                <span class="logo-text">NovaStore</span>
            </a>

            <nav class="nav" id="nav">
                <a href="index.html" data-i18n="nav.home"></a>
                <a href="shop.html" data-i18n="nav.shop"></a>
                <a href="support.html" data-i18n="nav.support"></a>
            </nav>

            <div class="header-actions">
                <button class="btn-icon" id="lang-toggle" aria-label="Language">
                    <span id="lang-label">EN</span>
                </button>
                <button class="btn-icon" id="theme-toggle" aria-label="Theme">
                    <span class="theme-icon">🌙</span>
                </button>
                <a href="login.html" class="btn ghost" data-i18n="nav.login"></a>
                <button class="btn-icon cart-btn" id="cart-toggle" aria-label="Cart">
                    <span class="cart-icon">🛒</span>
                    <span class="cart-count" id="cart-count">0</span>
                </button>
                <button class="burger" id="burger" aria-label="Menu">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </header>

    <aside class="cart-sidebar" id="cart-sidebar" aria-label="Shopping cart">
        <div class="cart-header">
            <h2 data-i18n="cart.title"></h2>
            <button class="btn-icon" id="cart-close">✕</button>
        </div>
        <div class="cart-items" id="cart-items"></div>
        <div class="cart-footer">
            <div class="cart-total">
                <span data-i18n="cart.total"></span>
                <span id="cart-total-amount">€0.00</span>
            </div>
            <button class="btn primary full" data-i18n="cart.checkout"></button>
        </div>
    </aside>

    <main>
        <section class="hero fade-in" id="hero">
            <div class="container hero-inner">
                <div class="hero-content">
                    <h1 data-i18n="hero.title"></h1>
                    <p class="hero-subtitle" data-i18n="hero.subtitle"></p>
                    <div class="hero-actions">
                        <a href="shop.html" class="btn primary ripple" data-i18n="hero.cta_primary"></a>
                        <a href="#benefits" class="btn ghost ripple" data-i18n="hero.cta_secondary"></a>
                    </div>
                    <div class="hero-badges">
                        <span data-i18n="hero.badge_secure"></span>
                        <span data-i18n="hero.badge_shipping"></span>
                    </div>
                </div>
                <div class="hero-visual glass-card">
                    <div class="hero-gradient"></div>
                    <div class="hero-product-card">
                        <h3 data-i18n="hero.featured_title"></h3>
                        <p data-i18n="hero.featured_desc"></p>
                        <span class="price-tag">€249</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="section fade-in" id="featured">
            <div class="container">
                <div class="section-header">
                    <h2 data-i18n="featured.title"></h2>
                    <p data-i18n="featured.subtitle"></p>
                </div>
                <div class="product-grid" id="featured-products">
                    <article class="product-card glass-card hover-lift" data-product-id="1">
                        <div class="product-image skeleton"></div>
                        <div class="product-body">
                            <h3 class="product-title">Aurora Wireless Headphones</h3>
                            <p class="product-category" data-i18n="categories.tech"></p>
                            <div class="product-meta">
                                <span class="product-price">€199</span>
                            </div>
                        </div>
                    </article>

                    <article class="product-card glass-card hover-lift" data-product-id="2">
                        <div class="product-image skeleton"></div>
                        <div class="product-body">
                            <h3 class="product-title">Nebula Smartwatch</h3>
                            <p class="product-category" data-i18n="categories.tech"></p>
                            <div class="product-meta">
                                <span class="product-price">€249</span>
                            </div>
                        </div>
                    </article>

                    <article class="product-card glass-card hover-lift" data-product-id="3">
                        <div class="product-image skeleton"></div>
                        <div class="product-body">
                            <h3 class="product-title">Lumen Minimal Sneakers</h3>
                            <p class="product-category" data-i18n="categories.fashion"></p>
                            <div class="product-meta">
                                <span class="product-price">€129</span>
                            </div>
                        </div>
                    </article>
                </div>
            </div>
        </section>

        <section class="section fade-in" id="categories">
            <div class="container">
                <div class="section-header">
                    <h2 data-i18n="categories.title"></h2>
                    <p data-i18n="categories.subtitle"></p>
                </div>
                <div class="category-grid">
                    <div class="category-card glass-card hover-lift">
                        <h3 data-i18n="categories.tech"></h3>
                        <p data-i18n="categories.tech_desc"></p>
                    </div>
                    <div class="category-card glass-card hover-lift">
                        <h3 data-i18n="categories.fashion"></h3>
                        <p data-i18n="categories.fashion_desc"></p>
                    </div>
                    <div class="category-card glass-card hover-lift">
                        <h3 data-i18n="categories.accessories"></h3>
                        <p data-i18n="categories.accessories_desc"></p>
                    </div>
                </div>
            </div>
        </section>

        <section class="section fade-in" id="benefits">
            <div class="container">
                <div class="section-header">
                    <h2 data-i18n="benefits.title"></h2>
                    <p data-i18n="benefits.subtitle"></p>
                </div>
                <div class="benefits-grid">
                    <div class="benefit-card glass-card hover-lift">
                        <h3 data-i18n="benefits.fast_shipping_title"></h3>
                        <p data-i18n="benefits.fast_shipping_desc"></p>
                    </div>
                    <div class="benefit-card glass-card hover-lift">
                        <h3 data-i18n="benefits.secure_payments_title"></h3>
                        <p data-i18n="benefits.secure_payments_desc"></p>
                    </div>
                    <div class="benefit-card glass-card hover-lift">
                        <h3 data-i18n="benefits.support_title"></h3>
                        <p data-i18n="benefits.support_desc"></p>
                    </div>
                </div>
            </div>
        </section>

        <section class="section fade-in" id="reviews">
            <div class="container">
                <div class="section-header">
                    <h2 data-i18n="reviews.title"></h2>
                    <p data-i18n="reviews.subtitle"></p>
                </div>
                <div class="reviews-grid">
                    <article class="review-card glass-card hover-lift">
                        <p class="review-text" data-i18n="reviews.r1_text"></p>
                        <span class="review-author" data-i18n="reviews.r1_author"></span>
                    </article>
                    <article class="review-card glass-card hover-lift">
                        <p class="review-text" data-i18n="reviews.r2_text"></p>
                        <span class="review-author" data-i18n="reviews.r2_author"></span>
                    </article>
                    <article class="review-card glass-card hover-lift">
                        <p class="review-text" data-i18n="reviews.r3_text"></p>
                        <span class="review-author" data-i18n="reviews.r3_author"></span>
                    </article>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer fade-in">
        <div class="container footer-inner">
            <div class="footer-col">
                <h4>NovaStore</h4>
                <p data-i18n="footer.tagline"></p>
            </div>

            <div class="footer-col">
                <h4 data-i18n="footer.links"></h4>
                <div class="footer-links">
                    <a href="shop.html" data-i18n="footer.shop"></a>
                    <a href="support.html" data-i18n="footer.support"></a>
                    <a href="legal.html#terms" data-i18n="footer.terms"></a>
                    <a href="legal.html#privacy" data-i18n="footer.privacy"></a>
                </div>
            </div>

            <div class="footer-col">
                <h4 data-i18n="footer.contact"></h4>

                <a class="footer-email" href="mailto:support@novastore.app">
                    support@novastore.app
                </a>

                <div class="socials" aria-label="Social links">
                    <a href="https://instagram.com" target="_blank" rel="noopener" aria-label="Instagram">
                        Instagram
                    </a>
                    <a href="https://x.com" target="_blank" rel="noopener" aria-label="X">
                        X
                    </a>
                    <a href="https://linkedin.com" target="_blank" rel="noopener" aria-label="LinkedIn">
                        LinkedIn
                    </a>
                </div>
            </div>
        </div>
    </footer>
    </body>
    </html>
